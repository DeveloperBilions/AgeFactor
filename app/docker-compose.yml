version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: longhealth-postgres
    environment:
      POSTGRES_USER: longhealth
      POSTGRES_PASSWORD: longhealth_dev
      POSTGRES_DB: longhealth_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U longhealth -d longhealth_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - longhealth-network

  redis:
    image: redis:7-alpine
    container_name: longhealth-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/var/lib/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - longhealth-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  longhealth-network:
    driver: bridge
